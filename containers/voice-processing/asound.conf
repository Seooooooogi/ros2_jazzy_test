# 컨테이너 ALSA 기본 캡처 장치 지정.
#
# 이 하드웨어(Raptor Lake cAVS)의 실제 동작 마이크는 Digital Microphone(DMIC) = card1 device6.
# 컨테이너가 잡는 raw ALSA 기본값은 hw:1,0(HDA Analog) 인데 아날로그 마이크가 안 꽂혀 무음만 들어온다
# (측정: DMIC RMS≈2200 vs Analog RMS≈2). 그래서 wakeword confidence 가 0 부근에 머물러 탐지 실패.
#
# 기본 PCM 을 DMIC 로 돌리고 plug 로 감싸 rate/format 변환을 맡긴다 →
# PyAudio wakeword(48kHz) 와 sounddevice STT(16kHz) 가 같은 마이크를 코드 수정 없이 사용.
#
# card/device 번호는 하드웨어 종속(동일 모델 fleet 가정). 다른 사운드 칩이면 `arecord -l` 로 DMIC 확인 후 조정.
pcm.!default {
    type plug
    slave.pcm "hw:1,6"
}
ctl.!default {
    type hw
    card 1
}

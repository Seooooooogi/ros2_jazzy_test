# CycloneDDS / 대용량 UDP-fragment 토픽 튜닝 (RealSense raw image, pointcloud).
# dds-tuning.sh 가 /etc/sysctl.d/60-cyclonedds.conf 로 설치한다.
# sysctl 형식: 주석은 줄 단위만. 값 뒤 inline 주석 금지(값의 일부로 파싱됨).

# --- IP fragment 재조립 (대용량 프레임은 UDP fragment 로 쪼개짐) ---
# 재조립 대기 시간(초). 기본 30s 는 오래된 조각이 재조립 풀을 오래 점유 → 낮춤.
net.ipv4.ipfrag_time = 3
# 재조립 버퍼 상한/하한(byte). high 도달 시 low 까지 비움. low < high 필수.
net.ipv4.ipfrag_high_thresh = 134217728
net.ipv4.ipfrag_low_thresh = 98304000

# --- UDP 수신 버퍼 ---
# 소켓 SO_RCVBUF 상한(byte, 최대 ~2GB). CycloneDDS SocketReceiveBufferSize 요청이
# 이 상한에 캡됨 → 둘을 함께 올려야 대용량 프레임 수신 버퍼가 실제로 잡힌다.
net.core.rmem_max = 2147483647
# 명시 설정 없는 소켓의 기본 SO_RCVBUF.
net.core.rmem_default = 268435456

# --- UDP 송신 버퍼 (다중 노드/로봇 송신) ---
# CycloneDDS SocketSendBufferSize 는 하드 최소값이라 wmem_max 가 부족하면
# 도메인 생성이 거부되어 노드가 죽는다 → 요청치(64MB) 이상 보장.
net.core.wmem_max = 2147483647
net.core.wmem_default = 67108864

# --- NIC 수신 큐 ---
# 커널이 처리하기 전 NIC 입력 큐 길이. 버스트 트래픽 드랍 완화.
net.core.netdev_max_backlog = 30000
